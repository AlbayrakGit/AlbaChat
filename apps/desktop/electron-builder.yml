appId: com.albachat.desktop
productName: AlbaChat
directories:
  output: dist
  buildResources: assets
files:
  - "**/*"
  - "!dist/**/*"
  - "electron/**/*"
  - "setup/**/*"
  - "assets/**/*"
afterPack: ./afterPack.js
win:
  target:
    - nsis
  icon: assets/AlbaChat.ico
  publisherName: "Erna Holding Bilgi Teknolojileri"
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "AlbaChat"
  artifactName: "AlbaChat-Setup-${version}.${ext}"
  uninstallDisplayName: "AlbaChat"
  deleteAppDataOnUninstall: true
  installerIcon: assets/AlbaChat.ico
  uninstallerIcon: assets/AlbaChat.ico
  include: installer.nsh
publish:
  provider: generic
  url: https://albachat.ernaholding.com/download
extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"
