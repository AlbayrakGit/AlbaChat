appId: com.AlbaChat.app
productName: AlbaChat
copyright: "Â© 2024 AlbaChat"

directories:
  output: dist
  buildResources: assets

files:
  - electron/**
  - setup/**
  - assets/**
  - package.json
  - node_modules/**

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/installer.ico
  uninstallerIcon: assets/installer.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AlbaChat
  artifactName: "AlbaChat-Setup-${version}.exe"

publish:
  # Ä°ntranet dosya paylaÅŸÄ±mÄ± iÃ§in â€” yolu .env'den veya doÄŸrudan belirt
  provider: generic
  url: "http://your-intranet-server/updates"
  channel: latest

# Auto-update config
electronVersion: "28.3.3"

