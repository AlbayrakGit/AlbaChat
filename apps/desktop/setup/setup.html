<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>AlbaChat â€” Sunucu Kurulumu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      color: #1a1a2e;
      -webkit-app-region: drag; /* pencereyi sÃ¼rÃ¼klenebilir yap */
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      -webkit-app-region: no-drag;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      color: white;
      stroke: white;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .logo-text p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 1px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: default; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .error.show { display: block; }

    .status {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      <div class="logo-text">
        <h1>AlbaChat</h1>
        <p>Sunucu Kurulumu</p>
      </div>
    </div>

    <div class="form-group">
      <label for="serverUrl">Sunucu Adresi</label>
      <input
        type="text"
        id="serverUrl"
        placeholder="http://192.168.1.100:8080"
        autocomplete="off"
        spellcheck="false"
      />
      <p class="hint">AÄŸ yÃ¶neticinizden sunucu IP adresini Ã¶ÄŸrenin.</p>
    </div>

    <button class="btn" id="connectBtn" onclick="connect()">BaÄŸlan</button>

    <div class="error" id="errorMsg"></div>

    <p class="status" id="statusMsg"></p>
  </div>

  <script>
    const input = document.getElementById('serverUrl');
    const btn = document.getElementById('connectBtn');
    const errorEl = document.getElementById('errorMsg');
    const statusEl = document.getElementById('statusMsg');

    // Enter tuÅŸuyla baÄŸlan
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });

    // Ã–nceden kayÄ±tlÄ± URL varsa doldur
    if (window.electronAPI) {
      window.electronAPI.getStoreValue('lastServerUrl').then((val) => {
        if (val) input.value = val;
      }).catch(() => {});
    }

    async function connect() {
      const raw = input.value.trim();
      if (!raw) {
        showError('Sunucu adresi boÅŸ olamaz.');
        return;
      }

      // URL formatÄ±nÄ± normalize et
      let url = raw;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'http://' + url;
      }
      url = url.replace(/\/$/, '');

      // BaÄŸlantÄ±yÄ± test et
      btn.disabled = true;
      btn.textContent = 'BaÄŸlanÄ±lÄ±yor...';
      statusEl.textContent = 'Sunucu kontrol ediliyor...';
      errorEl.classList.remove('show');

      try {
        const res = await fetch(`${url}/health`, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const json = await res.json();
        if (json.status !== 'ok') throw new Error('Sunucu yanÄ±tÄ± beklenmedik.');

        // BaÅŸarÄ±lÄ± â€” kurulumu tamamla
        statusEl.textContent = 'BaÄŸlantÄ± baÅŸarÄ±lÄ±! AÃ§Ä±lÄ±yor...';
        if (window.electronAPI) {
          window.electronAPI.setStoreValue('lastServerUrl', url);
          window.electronAPI.completeSetup(url);
        }
      } catch (err) {
        let msg = 'Sunucuya baÄŸlanÄ±lamadÄ±.';
        if (err.name === 'TimeoutError') msg = 'BaÄŸlantÄ± zaman aÅŸÄ±mÄ±na uÄŸradÄ±. Sunucu Ã§alÄ±ÅŸÄ±yor mu?';
        else if (err.message.includes('Failed to fetch')) msg = 'Sunucu bulunamadÄ±. Adres doÄŸru mu?';
        showError(msg);
        btn.disabled = false;
        btn.textContent = 'BaÄŸlan';
        statusEl.textContent = '';
      }
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('show');
    }
  </script>
</body>
</html>
