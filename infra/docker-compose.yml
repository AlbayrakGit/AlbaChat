services:
  albachat-postgres:
    image: postgres:16-alpine
    container_name: albachat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-albachat}
      POSTGRES_USER: ${POSTGRES_USER:-albachat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-albachat_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-albachat} -d ${POSTGRES_DB:-albachat}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  albachat-redis:
    image: redis:7-alpine
    container_name: albachat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  albachat-minio:
    image: minio/minio:latest
    container_name: albachat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3

  albachat-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: albachat-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-albachat}:${POSTGRES_PASSWORD:-albachat_secret}@albachat-postgres:5432/${POSTGRES_DB:-albachat}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@albachat-redis:6379
      MINIO_ENDPOINT: albachat-minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-albachat-files}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-/storage}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@albachat.local}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      albachat-postgres:
        condition: service_healthy
      albachat-redis:
        condition: service_healthy
      albachat-minio:
        condition: service_started

  albachat-frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: albachat-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - albachat-api

networks:
  default:
    name: albachat-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
