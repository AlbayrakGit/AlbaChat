##############################################################################
# albachat â€” Production Docker Compose
#
# KullanÄ±m:
#   cp .env.example .env          # DeÄŸerleri doldur
#   docker compose -f infra/docker-compose.prod.yml up -d
#
# Web arayÃ¼zÃ¼ Ã¶nceden build edilmeli:
#   npm run build -w apps/web
##############################################################################

services:
  # â”€â”€â”€ PostgreSQL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: postgres:16-alpine
    container_name: albachat-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-albachat}
      POSTGRES_USER: ${POSTGRES_USER:-albachat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?LÃ¼tfen .env'de POSTGRES_PASSWORD ayarlayÄ±n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-albachat} -d ${POSTGRES_DB:-albachat}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # DÄ±ÅŸarÄ±ya port aÃ§ma â€” yalnÄ±zca backend aÄŸÄ±ndan eriÅŸilebilir
    expose:
      - "5432"

  # â”€â”€â”€ Redis â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis:
    image: redis:7-alpine
    container_name: albachat-redis
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?LÃ¼tfen .env'de REDIS_PASSWORD ayarlayÄ±n} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # â”€â”€â”€ MinIO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  minio:
    image: minio/minio:latest
    container_name: albachat-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?LÃ¼tfen .env'de MINIO_ROOT_USER ayarlayÄ±n}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?LÃ¼tfen .env'de MINIO_ROOT_PASSWORD ayarlayÄ±n}
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3
    # MinIO console'u isteÄŸe baÄŸlÄ± dÄ±ÅŸa aÃ§
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    expose:
      - "9000"

  # â”€â”€â”€ API â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: albachat/api:${APP_VERSION:-latest}
    container_name: albachat-api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-albachat}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-albachat}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-albachat-files}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-/storage}
      JWT_SECRET: ${JWT_SECRET:?LÃ¼tfen .env'de JWT_SECRET ayarlayÄ±n}
      REFRESH_SECRET: ${REFRESH_SECRET:?LÃ¼tfen .env'de REFRESH_SECRET ayarlayÄ±n}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@albachat.local}
      API_PORT: "3001"
      API_HOST: "0.0.0.0"
      # nginxService iÃ§in: nginx container'a reload komutu gÃ¶ndermek
      NGINX_CONTAINER: albachat-nginx
      NGINX_CONFD_DIR: /etc/nginx/conf.d
    volumes:
      # Docker socket â€” nginx -s reload iÃ§in (read-only, yalnÄ±zca exec yetkisi kullanÄ±lÄ±r)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # PaylaÅŸÄ±mlÄ± nginx conf.d â€” API buraya yazar, nginx buradan okur
      - nginx_confd:/etc/nginx/conf.d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - backend
      - frontend
    expose:
      - "3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # â”€â”€â”€ Nginx (Web + Proxy) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  nginx:
    image: nginx:1.25-alpine
    container_name: albachat-nginx
    restart: always
    # Base image'Ä±n default.conf'unu kaldÄ±r, sonra nginx'i baÅŸlat
    entrypoint: [ "/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'" ]
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../apps/web/dist:/usr/share/nginx/html:ro
      # PaylaÅŸÄ±mlÄ± conf.d â€” API tarafÄ±ndan yazÄ±lan dinamik direktifler (max body vb.)
      - nginx_confd:/etc/nginx/conf.d
      # HTTPS iÃ§in: self-signed CA sertifikalarÄ±
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# â”€â”€â”€ AÄŸlar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
networks:
  backend:
    driver: bridge
    internal: true # DÄ±ÅŸarÄ±dan eriÅŸilemez
  frontend:
    driver: bridge

# â”€â”€â”€ KalÄ±cÄ± Veriler â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  # API â†’ nginx conf.d paylaÅŸÄ±mÄ± (dinamik direktifler)
  nginx_confd:
    driver: local
